<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Consórcio Profissional</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:#002b5c;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.main-container{
    display:flex;
    gap:40px;
    max-width:1250px;
    width:100%;
}

.text-content{
    flex:1;
    max-width:420px;
}
.text-content h1{
    font-size:3rem;
    font-weight:800;
    margin-bottom:20px;
}
.text-content p{
    font-size:1.2rem;
    opacity:.9;
    margin-bottom:30px;
}

.card-white{
    background:white;
    color:#333;
    padding:40px;
    border-radius:20px;
    width:420px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
}

select,input{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border:2px solid #eee;
    border-radius:12px;
    background:#f9f9f9;
    font-size:1rem;
}
select:focus,input:focus{
    border-color:#0056b3;
    background:white;
}

.btn-submit{
    width:100%;
    padding:18px;
    background:#0056b3;
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
}
.btn-submit:hover{
    background:#004494;
}
