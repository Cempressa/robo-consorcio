<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio Profissional</title>

    <style>
        /* RESET */
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

        body{
            background:#002b5c;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        /* LAYOUT PRINCIPAL */
        .main-container{
            display:flex;
            gap:40px;
            max-width:1250px;
            width:100%;
        }

        /* TEXTO ESQUERDA */
        .text-content{
            flex:1;
            max-width:420px;
        }
        .text-content h1{
            font-size:3rem;
            font-weight:800;
            margin-bottom:20px;
        }
        .text-content p{
            font-size:1.2rem;
            opacity:.9;
            margin-bottom:30px;
        }

        /* CARD CENTRAL */
        .card-white{
            background:white;
            color:#333;
            padding:40px;
            border-radius:20px;
            width:420px;
            box-shadow:0 20px 40px rgba(0,0,0,.4);
        }

        /* CAMPOS */
        select,input{
            width:100%;
            padding:16px;
            margin-bottom:20px;
            border:2px solid #eee;
            border-radius:12px;
            background:#f9f9f9;
            font-size:1rem;
            outline: none;
        }
        
        input { cursor: text; }
        select { cursor: pointer; }

        select:focus,input:focus{
            border-color:#0056b3;
            background:white;
        }

        /* BOTÃO */
        .btn-submit{
            width:100%;
            padding:18px;
            background:#0056b3;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:700;
            cursor:pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-submit:hover{
            background:#004494;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }

        /* CARD DIREITA */
        .card-info{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:30px;
            border-radius:20px;
            width:340px;
            min-height:250px;
        }
        .card-info h3{
            color:#4da6ff;
            margin-bottom:15px;
        }

        /* RESPONSIVO */
        @media(max-width:900px){
            .main-container{
                flex-direction:column;
                align-items:center;
            }
            .card-white,.card-info{
                width:100%;
                max-width:420px;
            }
        }
    </style>
</head>

<body>

<div class="main-container">

    <div class="text-content">
        <h1>Oportunidades acontecem.<br>Planeje e aproveite.</h1>
        <p>Transforme seus sonhos em patrimônio real com a estratégia financeira certa para você ou sua empresa.</p>
    </div>

    <div class="card-white">
        <h2>Simule seu Futuro</h2>

        <input type="text" placeholder="Seu Nome Completo" id="nomeCompleto">
        <input type="tel" placeholder="WhatsApp (DDD + Número)" id="telefone" maxlength="15">
        <input type="email" placeholder="Seu melhor e-mail" id="email">

        <select id="categoriaSelect">
            <option value="" disabled selected>Selecione uma categoria</option>
            <option value="imoveis">Consórcio de Imóveis</option>
            <option value="veiculos">Consórcio de Veículos</option>
            <option value="servicos">Consórcio de Serviços</option>
            <option value="outrosBens">Consórcio de Outros Bens</option>
            <option value="investimentos">Investimentos & Outros</option>
        </select>

        <!-- SUBMENU DEVOLVIDO -->
        <div id="wrapperOpcao" style="display:none;">
            <select id="opcaoSelect">
                <option value="" disabled selected>Selecione uma opção</option>
            </select>
        </div>

        <button class="btn-submit" id="btnEnviar">Simular Agora</button>
    </div>

    <div class="card-info">
        <h3>Informações</h3>
        <p id="infoText">Selecione uma categoria e uma opção para ver detalhes.</p>
    </div>

</div>

<script>
const opcoes = {
    imoveis:{
        "Aquisição e Construção":"Use o consórcio para adquirir ou construir seu imóvel.",
        "Reforma e Melhoria":"Ideal para reformas e ampliações planejadas.",
        "Quitação de financiamento":"Antecipe a quitação do seu financiamento atual."
    },
    veiculos:{
        "Carros e Motos":"Planeje a compra do seu veículo sem juros.",
        "Barcos e Navios":"Consórcio para embarcações de todos os portes.",
        "Aviões e Drones":"Ideal para aeronaves leves e drones profissionais.",
        "Maquinários Agrícolas":"Perfeito para produtores e empresas rurais.",
        "Outros":"Outros veículos e equipamentos sob consulta."
    },
    servicos:{
        "Implante Capilar":"Procedimentos estéticos financiados sem juros.",
        "Cirurgias e procedimentos estéticos":"Planeje cirurgias com segurança financeira.",
        "Viagens":"Viaje com planejamento e economia.",
        "Festas de casamento e formaturas":"Realize eventos especiais com tranquilidade."
    },
    outrosBens:{
        "Móveis planejados":"Ideal para mobiliar sua casa com qualidade.",
        "Placas solares":"Economia e sustentabilidade com energia solar.",
        "Equipamentos para academias":"Monte ou amplie sua academia.",
        "Equipamentos odontológicos":"Equipamentos modernos para consultórios.",
        "Equipamentos hospitalares":"Soluções para clínicas e hospitais.",
        "Equipamentos para escritórios":"Mobília e equipamentos corporativos.",
        "Outros":"Outros bens e equipamentos sob consulta."
    },
    investimentos:{
        "Aposentadoria Imobiliária":"Construa renda passiva com imóveis.",
        "Cota Investimento":"Invista em cotas com potencial de valorização.",
        "Cota Previdência":"Planejamento previdenciário inteligente.",
        "Alavancagem Financeira":"Multiplique seu capital com estratégia.",
        "Cotas Contempladas":"Aproveite oportunidades já contempladas.",
        "Assunção de dívida":"Assuma cotas com saldo reduzido.",
        "Home Equity":"Use seu imóvel como garantia para crédito.",
        "Car Equity":"Use seu veículo como garantia.",
        "Cota Equity":"Estratégia avançada de alavancagem."
    }
};

const categoriaSelect = document.getElementById("categoriaSelect");
const opcaoSelect = document.getElementById("opcaoSelect");
const wrapperOpcao = document.getElementById("wrapperOpcao");
const infoText = document.getElementById("infoText");
const btnEnviar = document.getElementById("btnEnviar");

// MÁSCARA TELEFONE
document.getElementById('telefone').addEventListener('input', (e) => {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
    e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
});

// LÓGICA SUBMENU
categoriaSelect.addEventListener("change", () => {
    const categoria = categoriaSelect.value;
    if (!categoria) return;

    opcaoSelect.innerHTML = `<option value="" disabled selected>Selecione uma opção</option>`;
    
    Object.keys(opcoes[categoria]).forEach(item => {
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        opcaoSelect.appendChild(opt);
    });

    wrapperOpcao.style.display = "block";
    infoText.textContent = "Agora selecione uma opção específica acima.";
});

opcaoSelect.addEventListener("change", () => {
    const cat = categoriaSelect.value;
    const opt = opcaoSelect.value;
    if(cat && opt) infoText.textContent = opcoes[cat][opt];
});

// ENVIO WHATSAPP + MAKE
btnEnviar.addEventListener("click", (e) => {
    e.preventDefault();

    // 1. CAPTURA OS VALORES
    const nome = document.getElementById("nomeCompleto").value.trim();
    const telefone = document.getElementById("telefone").value.trim();
    const email = document.getElementById("email").value.trim();
    const categoria = categoriaSelect.value;
    const opcao = opcaoSelect.value;

    if(!nome || !telefone || !categoria || !opcao){
        alert("Preencha todos os campos.");
        return;
    }

    // 2. ABRIR WHATSAPP (IRLANDA)
    const mensagem = `Olá! Me chamo ${nome}. Tenho interesse em ${categoria} - ${opcao}.`;
    const whatsappURL = `https://wa.me/353832097328?text=${encodeURIComponent(mensagem)}`;
    window.open(whatsappURL, "_blank");

    // 3. LIMPAR A TELA NA HORA (FORÇADO)
    // Fazemos isso antes do fetch para garantir que funcione
    document.getElementById("nomeCompleto").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("email").value = "";
    categoriaSelect.selectedIndex = 0;
    document.getElementById("wrapperOpcao").style.display = "none";
    infoText.textContent = "Simulação enviada com sucesso!";

    // 4. ENVIAR PARA O MAKE
    fetch("https://hook.us2.make.com/vn65j0s5ofboyiyb1qv2mrx1piaoq9up", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, telefone, email, categoria, opcao })
    })
    .then(() => console.log("Dados enviados!"))
    .catch(err => console.log("Erro no Make, mas a tela já limpou."));
});
