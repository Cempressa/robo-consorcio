<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background-color: #002b5c; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        /* ESTE É O CONTAINER QUE ALINHA OS 3 ELEMENTOS */
        .main-container { 
            display: flex; 
            flex-direction: row; /* Coloca um ao lado do outro */
            align-items: center; 
            justify-content: center; 
            gap: 30px; 
            max-width: 1200px; 
            width: 100%;
        }

        /* 1. TEXTO DA ESQUERDA */
        .text-content { 
            flex: 1; 
            max-width: 400px; 
        }
        .text-content h1 { font-size: 3rem; line-height: 1.1; margin-bottom: 15px; }
        .blue-light { color: #4da6ff; }

        /* 2. CARD DO FORMULÁRIO (CENTRO) */
        .card-white { 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 20px; 
            width: 400px; /* Largura fixa para não achatar */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .card-white h2 { color: #002b5c; margin-bottom: 25px; font-size: 1.8rem; }
        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            font-size: 1rem; 
        }
        .btn-submit { 
            width: 100%; 
            padding: 18px; 
            background: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* 3. CARD DE INFORMAÇÃO (DIREITA) */
        .card-info { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 25px; 
            border-radius: 15px; 
            width: 300px; 
            min-height: 200px;
        }
        .card-info h3 { color: #4da6ff; margin-bottom: 15px; font-size: 1.4rem; }
        .card-info p { font-size: 1rem; line-height: 1.4; color: #d1e3ff; }

        /* Responsividade para celular */
        @media (max-width: 1000px) {
            .main-container { flex-direction: column; text-align: center; }
            .card-white { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="text-content">
            <h1>Oportunidades acontecem. <br><span class="blue-light">Planeje e aproveite.</span></h1>
            <p>Transforme seus sonhos em patrimônio real com a estratégia certa.</p>
        </div>

        <div class="card-white">
            <h2>Simule seu Futuro</h2>
            <form id="form-consorcio">
                <input type="text" id="nome" placeholder="Seu Nome Completo" required>
                <input type="tel" id="whatsapp" placeholder="WhatsApp (DDD + Número)" required>
                <input type="email" id="email" placeholder="Seu melhor E-mail" required>
                
                <select id="selecaoServico">
                    <option value="Imóveis">Consórcio de Imóveis</option>
                    <option value="Veículos">Consórcio de Veículos</option>
                    <option value="Alavancagem">Alavancagem Financeira</option>
                </select>
                
                <button type="submit" class="btn-submit">QUERO SIMULAR AGORA</button>
            </form>
        </div>

        <div class="card-info">
            <h3 id="info-titulo">Imóveis</h3>
            <p id="info-texto">A compra planejada. Ideal para quem quer fugir dos juros bancários e construir patrimônio sólido.</p>
        </div>

    </div>

    <script>
        // Lógica para trocar o texto da direita ao mudar o select
        const conteudos = {
            "Imóveis": { t: "Imóveis", d: "A compra planejada. Ideal para quem quer fugir dos juros bancários e construir patrimônio sólido." },
            "Veículos": { t: "Veículos", d: "Troque de frota ou conquiste seu carro novo com parcelas que cabem no seu bolso." },
            "Alavancagem": { t: "Alavancagem", d: "Estratégia avançada: use o consórcio para multiplicar capital e gerar renda passiva." }
        };

        const select = document.getElementById('selecaoServico');
        select.addEventListener('change', function() {
            const item = conteudos[this.value];
            document.getElementById('info-titulo').innerText = item.t;
            document.getElementById('info-texto').innerText = item.d;
        });

        // Bloqueio de envio apenas para teste de layout (remova o alert depois)
        document.getElementById('form-consorcio').onsubmit = (e) => {
            e.preventDefault();
            alert("Layout ok! Agora cole o link da sua API no código para enviar os dados.");
        };
    </script>
</body>
</html>
