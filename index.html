<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio Profissional</title>
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: #002b5c;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 40px;
            max-width: 1250px;
            width: 100%;
        }

        /* TEXTO ESQUERDA */
        .text-content { flex: 1; max-width: 420px; }
        .text-content h1 { font-size: 3rem; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
        .text-content p { font-size: 1.2rem; opacity: .8; margin-bottom: 30px; }

        /* CARD CENTRAL */
        .card-white {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,.4);
        }
        .card-white h2 { margin-bottom: 25px; font-size: 1.5rem; color: #002b5c; }

        /* FORMULÁRIO */
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: 600; color: #666; }
        select, input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: #f9f9f9;
            font-size: 1rem;
            transition: all 0.3s;
        }
        select:focus, input:focus { outline: none; border-color: #0056b3; background: white; }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover { background: #004494; }

        /* CARD DIREITA (DETALHES) */
        .card-info {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 340px;
            display: flex;
            flex-direction: column;
        }
        .card-info h3 { color: #4da6ff; margin-bottom: 15px; font-size: 1.2rem; }
        .card-info p { line-height: 1.6; opacity: 0.9; }

        /* RESPONSIVO */
        @media(max-width: 950px) {
            .main-container { flex-direction: column; align-items: center; }
            .card-white, .card-info, .text-content { width: 100%; max-width: 500px; text-align: center; }
            .text-content h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="text-content">
        <h1>Oportunidades acontecem.<br>Planeje e aproveite.</h1>
        <p>Transforme seus sonhos em patrimônio real com a estratégia financeira certa.</p>
    </div>

    <div class="card-white">
        <h2>Simule seu Futuro</h2>
        
        <input type="text" id="nomeCompleto" placeholder="Nome Completo">
        <input type="tel" id="telefone" placeholder="WhatsApp (DDD + Número)" maxlength="15">
        <input type="email" id="email" placeholder="E-mail principal">

        <label>O que você busca?</label>
        <select id="categoriaSelect">
            <option value="" disabled selected>Selecione uma categoria</option>
            <option value="imoveis">Consórcio de Imóveis</option>
            <option value="veiculos">Consórcio de Veículos</option>
            <option value="servicos">Consórcio de Serviços</option>
            <option value="outrosBens">Consórcio de Outros Bens</option>
            <option value="investimentos">Investimentos & Estratégias</option>
        </select>

        <div id="wrapperOpcao" style="display:none;">
            <label>Opção específica:</label>
            <select id="opcaoSelect">
                <option value="" disabled selected>Selecione uma opção</option>
            </select>
        </div>

        <button class="btn-submit" id="btnEnviar">Simular Agora</button>
    </div>

    <div class="card-info">
        <h3>Detalhes do Plano</h3>
        <p id="infoText">Escolha uma categoria para ver como podemos ajudar no seu planejamento.</p>
    </div>
</div>

<script>
const opcoes = {
    imoveis: {
        "Aquisição e Construção": "Use o consórcio para adquirir ou construir seu imóvel residencial ou comercial.",
        "Reforma e Melhoria": "Ideal para reformas e ampliações planejadas sem pagar juros bancários.",
        "Quitação de financiamento": "Use sua carta para quitar saldos devedores de financiamentos caros."
    },
    veiculos: {
        "Carros e Motos": "Planeje a troca do seu veículo com parcelas que cabem no bolso.",
        "Barcos e Navios": "Consórcio para embarcações de todos os portes e motores.",
        "Maquinários Agrícolas": "Renovação de frota para produtores rurais com taxas administrativas baixas."
    },
    servicos: {
        "Estética e Saúde": "Cirurgias, implantes e procedimentos estéticos planejados.",
        "Viagens e Intercâmbio": "Realize a viagem dos sonhos com economia real.",
        "Eventos": "Casamentos, formaturas e festas corporativas."
    },
    outrosBens: {
        "Placas Solares": "Invista em energia limpa e reduza sua conta de luz drasticamente.",
        "Móveis Planejados": "Equipe sua casa ou escritório com alto padrão.",
        "Equipamentos Profissionais": "Soluções para clínicas, consultórios e academias."
    },
    investimentos: {
        "Alavancagem Financeira": "Estratégia para multiplicar patrimônio usando o poder do grupo.",
        "Aposentadoria Imobiliária": "Construa uma carteira de aluguéis através do consórcio.",
        "Cotas Contempladas": "Acesso imediato ao crédito com oportunidades de mercado."
    }
};

// Seletores
const categoriaSelect = document.getElementById("categoriaSelect");
const opcaoSelect = document.getElementById("opcaoSelect");
const wrapperOpcao = document.getElementById("wrapperOpcao");
const infoText = document.getElementById("infoText");
const btnEnviar = document.getElementById("btnEnviar");

// Máscara Simples para Telefone
document.getElementById('telefone').addEventListener('input', (e) => {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
    e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
});

// Lógica de Submenu
categoriaSelect.addEventListener("change", () => {
    const cat = categoriaSelect.value;
    if (!cat) return;

    opcaoSelect.innerHTML = '<option value="" disabled selected>Selecione uma opção</option>';
    
    Object.keys(opcoes[cat]).forEach(opt => {
        const el = document.createElement("option");
        el.value = opt;
        el.textContent = opt;
        opcaoSelect.appendChild(el);
    });

    wrapperOpcao.style.display = "block";
    infoText.textContent = "Excelente escolha. Agora selecione o objetivo específico acima.";
});

opcaoSelect.addEventListener("change", () => {
    const cat = categoriaSelect.value;
    const opt = opcaoSelect.value;
    infoText.style.color = "#white";
    infoText.textContent = opcoes[cat][opt];
});

// Envio
btnEnviar.addEventListener("click", async () => {
    const dados = {
        nome: document.getElementById("nomeCompleto").value.trim(),
        telefone: document.getElementById("telefone").value.trim(),
        email: document.getElementById("email").value.trim(),
        categoria: categoriaSelect.value,
        opcao: opcaoSelect.value
    };

    if (Object.values(dados).some(v => !v)) {
        alert("Por favor, preencha todos os campos antes de simular.");
        return;
    }

    // 1. Enviar para o Make (Webhook)
    try {
        fetch("https://hook.us2.make.com/vn65j0s5ofboyiyb1qv2mrx1piaoq9up", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados)
        });
    } catch (e) { console.error("Erro no Webhook"); }

    // 2. Redirecionar para WhatsApp (Substitua pelo SEU número)
    const seuNumero = "5519999999999"; // <-- COLOQUE SEU NÚMERO AQUI
    const msg = `Olá! Acabei de fazer uma simulação no site.\n*Nome:* ${dados.nome}\n*Interesse:* ${dados.categoria} (${dados.opcao})`;
    const url = `https://wa.me/${seuNumero}?text=${encodeURIComponent(msg)}`;
    
    window.open(url, "_blank");
});
</script>

</body>
</html>
