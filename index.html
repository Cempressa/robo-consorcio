<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio Ademicon</title>
    <style>
        /* RESET E DEFINIÇÕES GERAIS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: #002b5c; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .main-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 40px; 
            max-width: 1100px; 
            width: 100%; 
            justify-content: center; 
            align-items: flex-start;
        }

        /* CAIXA BRANCA (FORMULÁRIO) */
        .card-white { 
            background: white; 
            color: #333; 
            padding: 35px; 
            border-radius: 15px; 
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }

        .card-white h2 { 
            color: #002b5c; 
            margin-bottom: 25px; 
            text-align: center; 
            font-size: 1.6rem;
        }

        .input-group { margin-bottom: 18px; }

        .input-group label { 
            display: block; 
            font-size: 0.9rem; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #444; 
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem; 
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0056b3;
        }

        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1rem; 
            transition: background 0.3s, transform 0.2s; 
            margin-top: 10px;
        }

        .btn-submit:hover { background: #003d82; transform: translateY(-2px); }
        .btn-submit:active { transform: translateY(0); }

        /* CAIXA INFORMATIVA (LADO DIREITO) */
        .card-info { 
            background: rgba(255,255,255,0.08); 
            padding: 40px; 
            border-radius: 15px; 
            width: 100%;
            max-width: 350px; 
            border: 1px solid rgba(255,255,255,0.15); 
            backdrop-filter: blur(8px); 
        }

        .card-info h3 { 
            color: #4da6ff; 
            margin-bottom: 20px; 
            font-size: 1.8rem; 
            border-bottom: 2px solid rgba(77, 166, 255, 0.3);
            padding-bottom: 10px;
        }

        .card-info p { 
            line-height: 1.7; 
            color: #f0f0f0; 
            font-size: 1.1rem; 
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- FORMULÁRIO -->
        <div class="card-white">
            <h2>Simulação</h2>
            <form id="form-consorcio">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Marcos Luiz" required>
                </div>
                <div class="input-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" name
