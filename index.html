<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio Profissional</title>

    <style>
        /* RESET */
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

        body{
            background:#002b5c;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        /* LAYOUT PRINCIPAL */
        .main-container{
            display:flex;
            gap:40px;
            max-width:1250px;
            width:100%;
        }

        /* TEXTO ESQUERDA */
        .text-content{
            flex:1;
            max-width:420px;
        }
        .text-content h1{
            font-size:3rem;
            font-weight:800;
            margin-bottom:20px;
        }
        .text-content p{
            font-size:1.2rem;
            opacity:.9;
            margin-bottom:30px;
        }

        /* CARD CENTRAL */
        .card-white{
            background:white;
            color:#333;
            padding:40px;
            border-radius:20px;
            width:420px;
            box-shadow:0 20px 40px rgba(0,0,0,.4);
        }

        /* CAMPOS */
        select,input{
            width:100%;
            padding:16px;
            margin-bottom:20px;
            border:2px solid #eee;
            border-radius:12px;
            background:#f9f9f9;
            font-size:1rem;
            outline: none;
        }
        
        input { cursor: text; }
        select { cursor: pointer; }

        select:focus,input:focus{
            border-color:#0056b3;
            background:white;
        }

        /* BOTÃO */
        .btn-submit{
            width:100%;
            padding:18px;
            background:#0056b3;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:700;
            cursor:pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-submit:hover{
            background:#004494;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }

        /* CARD DIREITA */
        .card-info{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:30px;
            border-radius:20px;
            width:340px;
            min-height:250px;
        }
        .card-info h3{
            color:#4da6ff;
            margin-bottom:15px;
        }

        /* RESPONSIVO */
        @media(max-width:900px){
            .main-container{
                flex-direction:column;
                align-items:center;
            }
            .card-white,.card-info{
                width:100%;
                max-width:420px;
            }
        }
    </style>
</head>

<body>

<div class="main-container">

    <div class="text-content">
        <h1>Oportunidades acontecem.<br>Planeje e aproveite.</h1>
        <p>Transforme seus sonhos em patrimônio real com a estratégia financeira certa para você ou sua empresa.</p>
    </div>

    <div class="card-white">
        <h2>Simule seu Futuro</h2>

        <input type="text" placeholder="Seu Nome Completo" id="nomeCompleto">
        <input type="tel" placeholder="WhatsApp (DDD + Número)" id="telefone" maxlength="15">
        <input type="email" placeholder="Seu melhor e-mail" id="email">

        <select id="categoriaSelect">
            <option value="" disabled selected>Selecione uma categoria</option>
            <option value="imoveis">Consórcio de Imóveis</option>
            <option value="veiculos">Consórcio de Veículos</option>
            <option value="servicos">Consórcio de Serviços</option>
            <option value="outrosBens">Consórcio de Outros Bens</option>
            <option value="investimentos">Investimentos & Outros</option>
        </select>

        <!-- SUBMENU DEVOLVIDO -->
        <div id="wrapperOpcao" style="display:none;">
            <select id="opcaoSelect">
                <option value="" disabled selected>Selecione uma opção</option>
            </select>
        </div>

        <button class="btn-submit" id="btnEnviar">Simular Agora</button>
    </div>

    <div class="card-info">
        <h3>Informações</h3>
        <p id="infoText">Selecione uma categoria e uma opção para ver detalhes.</p>
    </div>

</div>

<script>
<script>
/**
 * PROTEÇÃO: Aguarda o documento carregar totalmente para evitar erros de "null"
 * e garante que todos os IDs (como categoriaSelect) já existam na tela.
 */
document.addEventListener("DOMContentLoaded", () => {

    // 1. Definição das Opções do Submenu
    const opcoes = {
        imoveis: { "Aquisição": "Compra de imóveis", "Reforma": "Reformas e construções" },
        veiculos: { "Carros": "Veículos leves", "Pesados": "Caminhões e máquinas" },
        servicos: { "Estética": "Procedimentos", "Viagens": "Turismo e festas" },
        outrosBens: { "Solar": "Energia fotovoltaica", "Móveis": "Planejados" },
        investimentos: { "Alavancagem": "Estratégia financeira", "Cotas": "Cotas contempladas" }
    };

    // 2. Mapeamento de Elementos do formulário
    const categoriaSelect = document.getElementById("categoriaSelect");
    const opcaoSelect = document.getElementById("opcaoSelect");
    const wrapperOpcao = document.getElementById("wrapperOpcao");
    const infoText = document.getElementById("infoText");
    const btnEnviar = document.getElementById("btnEnviar");

    // Validação de segurança: Se o campo principal não existir, para o código aqui e avisa no F12
    if (!categoriaSelect) {
        console.error("Erro Crítico: O elemento 'categoriaSelect' não foi encontrado no seu HTML. Verifique se o ID está correto.");
        return;
    }

    // 3. Lógica do Submenu (Atualiza as opções quando você escolhe a categoria)
    categoriaSelect.addEventListener("change", function() {
        const cat = this.value;
        
        if (!cat || !opcoes[cat]) {
            if (wrapperOpcao) wrapperOpcao.style.display = "none";
            return;
        }

        // Limpa as opções anteriores e adiciona o placeholder
        opcaoSelect.innerHTML = '<option value="" disabled selected>Selecione uma opção</option>';
        
        // Adiciona as novas opções baseadas na categoria escolhida
        Object.keys(opcoes[cat]).forEach(opt => {
            const el = document.createElement("option");
            el.value = opt;
            el.textContent = opt;
            opcaoSelect.appendChild(el);
        });

        // Torna o segundo menu visível
        if (wrapperOpcao) wrapperOpcao.style.display = "block";
        if (infoText) infoText.textContent = "Agora selecione a opção desejada acima.";
    });

    // 4. Lógica de Envio (WhatsApp + Make) e Limpeza de tela
    if (btnEnviar) {
        btnEnviar.addEventListener("click", function(e) {
            e.preventDefault(); // Impede a página de recarregar

            // Captura os valores digitados
            const nome = document.getElementById("nomeCompleto").value.trim();
            const telefone = document.getElementById("telefone").value.trim();
            const email = document.getElementById("email").value.trim();
            const categoria = categoriaSelect.value;
            const opcao = opcaoSelect.value;

            // Validação simples de campos vazios
            if (!nome || !telefone || !categoria || !opcao) {
                alert("Por favor, preencha todos os campos antes de simular.");
                return;
            }

            // AÇÃO 1: Abrir WhatsApp (Número da Irlanda configurado)
            const msg = `Olá! Me chamo ${nome}. Tenho interesse em ${categoria} (${opcao}).`;
            const whatsappURL = `https://wa.me/353832097328?text=${encodeURIComponent(msg)}`;
            window.open(whatsappURL, "_blank");

            // AÇÃO 2: Limpeza imediata dos campos (Para o usuário ver que foi enviado)
            document.getElementById("nomeCompleto").value = "";
            document.getElementById("telefone").value = "";
            document.getElementById("email").value = "";
            categoriaSelect.selectedIndex = 0;
            if (wrapperOpcao) wrapperOpcao.style.display = "none";
            if (infoText) infoText.textContent = "Simulação enviada com sucesso! Verifique seu WhatsApp.";

            // AÇÃO 3: Envio dos dados para o seu Webhook do Make
            fetch("https://hook.us2.make.com/vn65j0s5ofboyiyb1qv2mrx1piaoq9up", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nome: nome,
                    telefone: telefone,
                    email: email,
                    categoria: categoria,
                    opcao: opcao,
                    origem: "Site Consórcio"
                })
            })
            .then(() => {
                console.log("Sucesso: Dados entregues ao Make.");
            })
            .catch(err => {
                console.error("Erro ao enviar para o Make:", err);
            });
        });
    }
});
</script>
