<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Ademicon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #002b5c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { display: flex; flex-wrap: wrap; gap: 40px; max-width: 1100px; width: 100%; justify-content: center; }
        .card-white { background: white; color: #333; padding: 30px; border-radius: 12px; width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .card-white h2 { color: #002b5c; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .btn-submit { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .card-info { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 12px; width: 300px; border: 1px solid rgba(255,255,255,0.2); }
        .card-info h3 { color: #4da6ff; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="card-white">
            <h2>Simule seu Consórcio</h2>
            <form id="form-consorcio">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" autocomplete="name" required>
                </div>
                <div class="input-group">
                    <label for="whatsapp">WhatsApp (DDD + Número)</label>
                    <input type="tel" id="whatsapp" name="whatsapp" autocomplete="tel" required>
                </div>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>
                <div class="input-group">
                    <label for="selecaoServico">O que deseja simular?</label>
                    <select id="selecaoServico" name="servico">
                        <option value="Imóveis">Imóveis</option>
                        <option value="Alavancagem">Alavancagem</option>
                        <option value="Veículos">Veículos</option>
                    </select>
                </div>
                <button type="submit" id="btn-enviar" class="btn-submit">QUERO SIMULAR AGORA</button>
            </form>
        </div>

        <div class="card-info">
            <h3 id="info-titulo">Imóveis</h3>
            <p id="info-texto">A compra planejada. Use para adquirir terrenos, casas ou construir.</p>
        </div>
    </div>

    <script>
        // Lógica visual do quadro lateral
        const conteudos = {
            "Imóveis": { t: "Imóveis", d: "A compra planejada. Ideal para fugir dos juros bancários." },
            "Alavancagem": { t: "Alavancagem", d: "Estratégia para ampliar capital sem descapitalizar seu caixa." },
            "Veículos": { t: "Veículos", d: "Renove sua frota ou conquiste seu carro novo com planejamento." }
        };

        const selectElement = document.getElementById('selecaoServico');
        selectElement.addEventListener('change', function() {
            const item = conteudos[this.value];
            document.getElementById('info-titulo').innerText = item.t;
            document.getElementById('info-texto').innerText = item.d;
        });

        // Envio para o Google Sheets via Sheet.best
        document.getElementById('form-consorcio').onsubmit = async (e) => {
            e.preventDefault();
            
            // SUBSTITUA O LINK ABAIXO PELO SEU DO SHEET.BEST
            const URL_API = "COLE_AQUI_SEU_LINK_DO_SHEET_BEST";

            if(URL_API.includes("COLE_AQUI")) return alert("Cole o link da sua API!");

            const btn = document.getElementById('btn-enviar');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            // MONTAGEM DOS DADOS (Chaves idênticas aos rótulos da sua imagem)
            const payload = {
                "data/Hora": new Date().toLocaleString("pt-BR"),
                "nome": document.getElementById('nome').value,
                "whatsApp": document.getElementById('whatsapp').value,
                "e-mail": document.getElementById('email').value,
                "produto": selectElement.value
            };

            try {
                const response = await fetch(URL_API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert("✅ Sucesso! Dados salvos na planilha.");
                    e.target.reset();
                } else {
                    alert("❌ Erro ao salvar. Verifique o link da API.");
                }
            } catch (err) {
                alert("❌ Erro de conexão.");
            } finally {
                btn.innerText = "QUERO SIMULAR AGORA";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
