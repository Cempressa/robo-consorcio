<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consórcio Planejado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #002b5c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { display: flex; flex-wrap: wrap; gap: 40px; max-width: 1100px; width: 100%; justify-content: center; }
        .text-content { flex: 1; min-width: 300px; }
        .text-content h1 { font-size: 2.2rem; margin-bottom: 15px; }
        .blue-light { color: #4da6ff; }
        .cards-wrapper { display: flex; flex-wrap: wrap; gap: 20px; }
        .card-white { background: white; color: #333; padding: 30px; border-radius: 12px; width: 350px; }
        .card-white h2 { color: #002b5c; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-submit { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .card-info { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; width: 260px; border: 1px solid rgba(255,255,255,0.2); }
        .card-info h3 { color: #4da6ff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="text-content">
            <h1>Oportunidades acontecem.<br><span class="blue-light">Planeje e conquiste.</span></h1>
            <p>Transforme sua visão em estratégia real.</p>
        </div>

        <div class="cards-wrapper">
            <div class="card-white">
                <h2>Simulação</h2>
                <form id="form-consorcio">
                    <div class="input-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" autocomplete="name" required>
                    </div>
                    <div class="input-group">
                        <label for="whatsapp">WhatsApp</label>
                        <input type="tel" id="whatsapp" name="whatsapp" autocomplete="tel" required>
                    </div>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" autocomplete="email" required>
                    </div>
                    <div class="input-group">
                        <label for="servico">Serviço</label>
                        <select id="servico" name="servico">
                            <option value="imoveis">Imóveis</option>
                            <option value="alavancagem">Alavancagem</option>
                            <option value="veiculos">Veículos</option>
                        </select>
                    </div>
                    <button type="submit" id="btn-enviar" class="btn-submit">ENVIAR AGORA</button>
                </form>
            </div>

            <div class="card-info">
                <h3 id="info-titulo">Imóveis</h3>
                <p id="info-texto">Compra planejada para terrenos, casas ou construção.</p>
            </div>
        </div>
    </div>

    <script>
        const dados = {
            imoveis: ["Imóveis", "Compra planejada para terrenos, casas ou construção."],
            alavancagem: ["Alavancagem", "Estratégia para multiplicar patrimônio sem descapitalizar."],
            veiculos: ["Veículos", "Renovação de frota ou carro novo com taxas reduzidas."]
        };

        const sel = document.getElementById('servico');
        sel.onchange = () => {
            document.getElementById('info-titulo').innerText = dados[sel.value][0];
            document.getElementById('info-texto').innerText = dados[sel.value][1];
        };

        document.getElementById('form-consorcio').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-enviar');
            
            // SUBSTITUA O LINK ABAIXO PELO SEU DO SHEET.BEST
            const URL = "COLE_AQUI_SEU_LINK_DO_SHEET_BEST"; 

            if(URL.includes("COLE_AQUI")) return alert("Falta o link do Sheet.best!");

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                await fetch(URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nome: document.getElementById('nome').value,
                        whatsapp: document.getElementById('whatsapp').value,
                        email: document.getElementById('email').value,
                        servico: sel.value
                    })
                });
                alert("Sucesso! Dados salvos.");
                e.target.reset();
            } catch (err) {
                alert("Erro ao enviar.");
            } finally {
                btn.innerText = "ENVIAR AGORA";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
