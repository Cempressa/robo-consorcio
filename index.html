<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #003366;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 850px;
            width: 100%;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            flex: 1;
            text-align: center;
        }

        /* Painel Lateral de Informação */
        .info-panel {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 0.8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        h2 { color: #003366; margin-bottom: 25px; }
        h3 { margin-top: 0; color: #4db8ff; }
        p { line-height: 1.6; font-size: 14px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #0052cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:disabled { background-color: #cccccc; }

        /* Ajuste para Mobile */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .info-panel { order: 2; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <h2>Simule seu Consórcio</h2>
        <form id="leadForm">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="text" id="celular" placeholder="WhatsApp (DDD + Número)" required>
            <input type="email" id="email" placeholder="Seu melhor E-mail" required>
            
            <select id="produto" required onchange="atualizarInfo()">
                <option value="" disabled selected>Selecione o Produto</option>
                <optgroup label="Imóveis">
                    <option value="imovel">Aquisição e Construção</option>
                    <option value="reforma">Reforma e Melhoria</option>
                    <option value="quitacao">Quitação de Financiamento</option>
                </optgroup>
                <optgroup label="Veículos">
                    <option value="auto">Carros e Motos</option>
                    <option value="pesados">Caminhão e Agro</option>
                </optgroup>
                <optgroup label="Estratégias">
                    <option value="alavancagem">Alavancagem Financeira</option>
                    <option value="equity">Home Equity</option>
                </optgroup>
            </select>

            <button type="submit" id="btnSubmit">QUERO SIMULAR AGORA</button>
        </form>
    </div>

    <!-- Painel Lateral Dinâmico -->
    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">Mente Programada</h3>
        <p id="infoDesc">Selecione um produto ao lado para ver como nossa estratégia consultiva pode acelerar seus planos sem os juros do financiamento.</p>
    </div>
</div>

<script>
    const descricoes = {
        "imovel": { title: "Imóveis", desc: "A compra planejada. Use para adquirir terrenos, casas ou construir. Ideal para quem quer fugir dos juros bancários e formar patrimônio." },
        "reforma": { title: "Reforma e Closet", desc: "Sabe aquele closet ou área gourmet que a esposa aguarda? Programe a reforma da sua residência com parcelas suaves." },
        "quitacao": { title: "Quitação de Dívida", desc: "Use o consórcio estrategicamente para quitar um financiamento imobiliário caro e reduzir drasticamente o custo do seu bem." },
        "auto": { title: "Automóveis", desc: "Troca de frota ou o carro da família. Com taxas administrativas reduzidas, você preserva seu capital para outros investimentos." },
        "pesados": { title: "Caminhão e Agro", desc: "Aumente sua produtividade. Maquinários e frotas essenciais para o crescimento do seu negócio logístico ou agrícola." },
        "alavancagem": { title: "Alavancagem", desc: "Estratégia para investidores. Use a contemplação para gerar lucro na venda ou criar renda passiva com aluguel." },
        "equity": { title: "Home Equity", desc: "Transforme o valor do seu imóvel ou veículo em liquidez imediata para novos negócios ou quitação de dívidas críticas." }
    };

    function atualizarInfo() {
        const prod = document.getElementById('produto').value;
        if(descricoes[prod]) {
            document.getElementById('infoTitle').innerText = descricoes[prod].title;
            document.getElementById('infoDesc').innerText = descricoes[prod].desc;
        }
    }

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Processando...";
        btn.disabled = true;

        const dados = {
            nome: document.getElementById('nome').value.trim(),
            celular: document.getElementById('celular').value.replace(/\D/g, ''),
            email: document.getElementById('email').value.trim(),
            produto: document.getElementById('produto').value
        };

        try {
            const response = await fetch('https://robo-consorcio.onrender.com/lead', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            if (response.ok) {
                const resData = await response.json();
                window.location.href = resData.redirect_url;
            } else { throw new Error(); }
        } catch (error) {
            alert("O servidor está iniciando. Tente novamente em alguns segundos.");
            btn.innerText = "QUERO SIMULAR AGORA";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
