<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Ademicon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #002b5c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .main-container { display: flex; flex-wrap: wrap; gap: 40px; max-width: 1100px; width: 100%; justify-content: center; }
        
        /* Caixa do Formulário */
        .card-white { background: white; color: #333; padding: 30px; border-radius: 12px; width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .card-white h2 { color: #002b5c; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .btn-submit { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-submit:hover { background: #003d82; }

        /* A PRIMEIRA CAIXA (QUE TINHA SUMIDO) */
        .card-info { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 12px; width: 320px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .card-info h3 { color: #4da6ff; margin-bottom: 15px; font-size: 1.8rem; }
        .card-info p { line-height: 1.6; color: #e0e0e0; font-size: 1.1rem; }
    </style>
</head>

    <div class="main-container">
        <!-- FORMULÁRIO -->
        <div class="card-white">
            <h2>Simule seu Consórcio</h2>
            <form id="form-consorcio">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" autocomplete="name" required>
                </div>
                <div class="input-group">
                    <label>WhatsApp (DDD + Número)</label>
                    <input type="tel" id="whatsapp" autocomplete="tel" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" autocomplete="email" required>
                </div>
                <div class="input-group">
                    <label>O que deseja simular?</label>
                    <select id="selecaoServico">
                        <option value="Imóveis">Imóveis</option>
                        <option value="Alavancagem">Alavancagem</option>
                        <option value="Veículos">Veículos</option>
                    </select>
                </div>
                <button type="submit" id="btn-enviar" class="btn-submit">QUERO SIMULAR AGORA</button>
            </form>
        </div>

        <!-- ESTA É A CAIXA QUE VOLTOU -->
        <div class="card-info">

        </div>
    </div>
