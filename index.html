<!-- Dentro do seu body -->
<form id="leadForm">
    <input type="text" id="nome" placeholder="Nome Completo" required>
    <input type="text" id="celular" placeholder="WhatsApp (DDD + Número)" required>
    <input type="email" id="email" placeholder="Seu melhor E-mail" required>
    
    <select id="produto">
        <option value="Automóvel">Automóvel</option>
        <option value="Pesados (Caminhão/Agro)">Pesados (Caminhão/Agro)</option>
        <option value="Imóvel">Imóvel</option>
        <option value="Serviços">Serviços (Viagem/Reforma)</option>
    </select>

    <button type="submit" id="btnSubmit">QUERO SIMULAR AGORA</button>
</form>

<script>
    // Usamos DOMContentLoaded para garantir que o HTML carregou antes do JS rodar
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('btnSubmit');
        const form = document.getElementById('leadForm');

        if (!form) {
            console.error("Erro: Formulário 'leadForm' não encontrado!");
            return;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.innerText = "Preparando sua simulação...";
            btn.disabled = true;

            const dados = {
                nome: document.getElementById('nome').value.trim(),
                celular: document.getElementById('celular').value.replace(/\D/g, ''),
                email: document.getElementById('email').value.trim(),
                produto: document.getElementById('produto').value
            };

            if (dados.celular.length < 10) {
                alert("Por favor, insira um WhatsApp válido com DDD.");
                btn.innerText = "QUERO SIMULAR AGORA";
                btn.disabled = false;
                return;
            }

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 60000);

                const response = await fetch('https://robo-consorcio.onrender.com/lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados),
                    signal: controller.signal
                });

                clearTimeout(id);

                if (response.ok) {
                    const resData = await response.json();
                    window.location.href = resData.redirect_url;
                } else {
                    throw new Error("Erro no servidor");
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("O sistema está inicializando. Por favor, aguarde 10 segundos e clique novamente.");
                btn.innerText = "QUERO SIMULAR AGORA";
                btn.disabled = false;
            }
        });
    });
</script>
