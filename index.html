<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Consórcio Profissional</title>

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:#002b5c;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* LAYOUT PRINCIPAL */
.main-container{
    display:flex;
    gap:40px;
    max-width:1250px;
    width:100%;
}

/* TEXTO ESQUERDA */
.text-content{
    flex:1;
    max-width:420px;
}
.text-content h1{
    font-size:3rem;
    font-weight:800;
    margin-bottom:20px;
}
.text-content p{
    font-size:1.2rem;
    opacity:.9;
    margin-bottom:30px;
}

/* CARD CENTRAL */
.card-white{
    background:white;
    color:#333;
    padding:40px;
    border-radius:20px;
    width:420px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* CAMPOS */
select,input{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border:2px solid #eee;
    border-radius:12px;
    background:#f9f9f9;
    font-size:1rem;
}
select:focus,input:focus{
    border-color:#0056b3;
    background:white;
}

/* BOTÃO */
.btn-submit{
    width:100%;
    padding:18px;
    background:#0056b3;
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
}
.btn-submit:hover{
    background:#004494;
}

/* CARD DIREITA */
.card-info{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    width:340px;
    min-height:250px;
}
.card-info h3{
    color:#4da6ff;
    margin-bottom:15px;
}

/* RESPONSIVO */
@media(max-width:900px){
    .main-container{
        flex-direction:column;
        align-items:center;
    }
    .card-white,.card-info{
        width:100%;
        max-width:420px;
    }
}
</style>
</head>

<body>

<div class="main-container">

    <!-- TEXTO ESQUERDA -->
    <div class="text-content">
        <h1>Oportunidades acontecem.<br>Planeje e aproveite.</h1>
        <p>Transforme seus sonhos em patrimônio real com a estratégia financeira certa para você ou sua empresa.</p>
    </div>

    <!-- CARD CENTRAL -->
    <div class="card-white">
        <h2>Simule seu Futuro</h2>

        <form id="form-consorcio">

            <input type="text" name="Nome" id="nome" placeholder="Seu Nome Completo" required>

            <input type="tel" name="WhatsApp" id="whatsapp" placeholder="WhatsApp (DDD + Número)" required>

            <input type="email" name="Email" id="email" placeholder="Seu melhor E-mail" required>

            <!-- SELECT PRINCIPAL -->
            <select name="Categoria" id="categoriaSelect" required>
                <option value="" disabled selected>Selecione uma categoria</option>
                <option value="imoveis">Consórcio de Imóveis</option>
                <option value="veiculos">Consórcio de Veículos</option>
                <option value="servicos">Consórcio de Serviços</option>
                <option value="outrosBens">Consórcio de Outros Bens</option>
                <option value="investimentos">Investimentos & Outros</option>
            </select>

            <!-- SELECT SECUNDÁRIO -->
            <select name="Opcao" id="opcaoSelect" style="display:none;" required>
                <option value="" disabled selected>Selecione uma opção</option>
            </select>

            <button type="submit" id="btn-enviar" class="btn-submit">QUERO SIMULAR AGORA</button>
        </form>
    </div>

    <!-- CARD DIREITA -->
    <div class="card-info">
        <h3 id="info-titulo">Informações</h3>
        <p id="info-texto">Selecione uma categoria e uma opção para ver detalhes.</p>
    </div>

</div>

<script>
/* DADOS DAS OPÇÕES */
const opcoes = {
    imoveis:{
        "Aquisição e Construção":"Use o consórcio para adquirir ou construir seu imóvel.",
        "Reforma e Melhoria":"Ideal para reformas e ampliações planejadas.",
        "Quitação de financiamento":"Antecipe a quitação do seu financiamento atual."
    },
    veiculos:{
        "Carros e Motos":"Planeje a compra do seu veículo sem juros.",
        "Barcos e Navios":"Consórcio para embarcações de todos os portes.",
        "Aviões e Drones":"Ideal para aeronaves leves e drones profissionais.",
        "Maquinários Agrícolas":"Perfeito para produtores e empresas rurais.",
        "Outros":"Outros veículos e equipamentos sob consulta."
    },
    servicos:{
        "Implante Capilar":"Procedimentos estéticos financiados sem juros.",
        "Cirurgias e procedimentos estéticos":"Planeje cirurgias com segurança financeira.",
        "Viagens":"Viaje com planejamento e economia.",
        "Festas de casamento e formaturas":"Realize eventos especiais com tranquilidade."
    },
    outrosBens:{
        "Móveis planejados":"Ideal para mobiliar sua casa com qualidade.",
        "Placas solares":"Economia e sustentabilidade com energia solar.",
        "Equipamentos para academias":"Monte ou amplie sua academia.",
        "Equipamentos odontológicos":"Equipamentos modernos para consultórios.",
        "Equipamentos hospitalares":"Soluções para clínicas e hospitais.",
        "Equipamentos para escritórios":"Mobília e equipamentos corporativos.",
        "Outros":"Outros bens e equipamentos sob consulta."
    },
    investimentos:{
        "Aposentadoria Imobiliária":"Construa renda passiva com imóveis.",
        "Cota Investimento":"Invista em cotas com potencial de valorização.",
        "Cota Previdência":"Planejamento previdenciário inteligente.",
        "Alavancagem Financeira":"Multiplique seu capital com estratégia.",
        "Cotas Contempladas":"Aproveite oportunidades já contempladas.",
        "Assunção de dívida":"Assuma cotas com saldo reduzido.",
        "Home Equity":"Use seu imóvel como garantia para crédito.",
        "Car Equity":"Use seu veículo como garantia.",
        "Cota Equity":"Estratégia avançada de alavancagem."
    }
};

/* ELEMENTOS */
const categoriaSelect=document.getElementById("categoriaSelect");
const opcaoSelect=document.getElementById("opcaoSelect");
const infoTitulo=document.getElementById("info-titulo");
const infoTexto=document.getElementById("info-texto");

/* QUANDO SELECIONA CATEGORIA */
categoriaSelect.addEventListener("change",()=>{
    const categoria=categoriaSelect.value;

    opcaoSelect.innerHTML=`<option disabled selected>Selecione uma opção</option>`;
    opcaoSelect.style.display="block";

    Object.keys(opcoes[categoria]).forEach(item=>{
        const opt=document.createElement("option");
        opt.value=item;
        opt.textContent=item;
        opcaoSelect.appendChild(opt);
    });

    infoTitulo.innerText="Informações";
    infoTexto.innerText="Agora selecione uma opção específica.";
});

/* QUANDO SELECIONA A OPÇÃO FINAL */
opcaoSelect.addEventListener("change",()=>{
    const categoria=categoriaSelect.value;
    const opcao=opcaoSelect.value;
    infoTitulo.innerText=opcao;
    infoTexto.innerText=opcoes[categoria][opcao];
});

/* ENVIO PARA MAKE + WHATSAPP + Planilha */
const scriptURL = "";
";

document.getElementById('form-consorcio').addEventListener('submit',function(e){
    e.preventDefault();

    const btn=document.getElementById('btn-enviar');
    btn.innerText="ENVIANDO...";https://script.google.com/macros/s/AKfycbwwZSIXrm5uv3TlsAlZ2E8NRxtNdNbR8o5rQ8fFfaGRd-XC2zaYgxD7ECq_80c51T2T/exec
    btn.disabled=true;

    const nome=document.getElementById('nome').value;
    const whatsapp=document.getElementById('whatsapp').value;
    const email=document.getElementById('email').value;
    const categoria=document.getElementById('categoriaSelect').value;
    const opcao=document.getElementById('opcaoSelect').value;

    fetch(scriptURL,{
        method:'POST',
        body:new FormData(this)
    });

    const mensagem=
        `Olá, meu nome é ${nome}.%0A`+
        `Gostaria de simular: ${categoria} - ${opcao}.%0A`+
        `Meu WhatsApp: ${whatsapp}%0A`+
        `Meu Email: ${email}`;

    const linkZap=`https://wa.me/55${whatsapp.replace(/\D/g,'')}?text=${mensagem}`;

    setTimeout(()=>{
        window.open(linkZap,"_blank");
        btn.innerText="QUERO SIMULAR AGORA";
        btn.disabled=false;
        document.getElementById('form-consorcio').reset();
    },800);
});
</script>

</body>
</html>
