<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Consórcio Profissional</title>
    <style>
        /* RESET E DEFINIÇÕES GERAIS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #002b5c; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            overflow-x: hidden;
        }

        /* CONTAINER PRINCIPAL (FLEXBOX PARA 3 COLUNAS) */
        .main-container { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 40px; 
            max-width: 1250px; 
            width: 100%;
        }

        /* 1. SEÇÃO DE TEXTO (ESQUERDA) */
        .text-content { 
            flex: 1; 
            max-width: 420px; 
            animation: fadeIn 0.8s ease-out;
        }
        .text-content h1 { font-size: 3.2rem; line-height: 1.1; margin-bottom: 20px; font-weight: 800; }
        .blue-light { color: #4da6ff; }
        .text-content p { font-size: 1.2rem; opacity: 0.9; line-height: 1.6; margin-bottom: 30px; }

        /* 2. CARD DO FORMULÁRIO (CENTRO) */
        .card-white { 
            background: white; 
            color: #333; 
            padding: 45px; 
            border-radius: 25px; 
            width: 430px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .card-white h2 { color: #002b5c; margin-bottom: 35px; font-size: 2rem; font-weight: 700; }
        
        /* ESTILO DOS CAMPOS */
        input, select { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 20px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 1rem; 
            outline: none;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        input:focus, select:focus { border-color: #0056b3; background: #fff; box-shadow: 0 0 10px rgba(0,86,179,0.1); }

        /* BOTÃO DE ENVIO */
        .btn-submit { 
            width: 100%; 
            padding: 22px; 
            background: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-submit:hover { background: #004494; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-submit:disabled { background: #a0a0a0; cursor: not-allowed; transform: none; }

        /* 3. CARD DE INFORMAÇÕES (DIREITA) */
        .card-info { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px);
            padding: 35px; 
            border-radius: 20px; 
            width: 340px; 
            min-height: 250px;
            animation: fadeInRight 1s ease-out;
        }
        .card-info h3 { color: #4da6ff; margin-bottom: 15
